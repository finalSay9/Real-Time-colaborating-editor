services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: development
    command: sh -c "cd /app/services/api-gateway && npx ts-node-dev --respawn --transpile-only src/index.ts"
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src
      - ./packages:/app/packages
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
      - "9229:9229"

  auth-service:
    build:
      context: .
