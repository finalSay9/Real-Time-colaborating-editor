# docker-compose.yml — BASE FILE
# Runs all infrastructure and services in production-like mode

version: '3.9'

networks:
  collab-net:
    driver: bridge  # All services share this network and can reach each other by service name

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:

  # ── INFRASTRUCTURE ────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/local/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    networks:
      - collab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./infra/local/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: internal (for services inside Docker) and external (for your host machine)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false' # We create topics explicitly
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9093:9093" # Expose external port to host
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    # One-shot container that creates all Kafka topics then exits
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - collab-net
    volumes:
      - ./infra/local/kafka/topics.sh:/topics.sh
    entrypoint: ["/bin/bash", "/topics.sh"]

  # ── SERVICES ──────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      COLLAB_SERVICE_URL: http://collaboration-service:3002
      DOCUMENT_SERVICE_URL: http://document-service:3003
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"   # The ONLY service exposed to the outside world
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collab-net
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://admin:secret@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - collab-net   # NOT exposed to host — only reachable via gateway
    restart: unless-stopped

  collaboration-service:
    build:
      context: .
      dockerfile: services/collaboration-service/Dockerfile
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - collab-net
    restart: unless-stopped

  document-service:
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://admin:secret@postgres:5432/document_db
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - collab-net
    restart: unless-stopped

  presence-service:
    build:
      context: .
      dockerfile: services/presence-service/Dockerfile
    environment:
      PORT: 3004
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collab-net
    restart: unless-stopped