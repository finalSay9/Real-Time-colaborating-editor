services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/local/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    networks:
      - collab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./infra/local/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    networks:
      - collab-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # No more Zookeeper — Kafka runs in KRaft mode
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9093:9093"
    networks:
      - collab-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s    # ← give kafka 2 minutes before checking
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      target: development
    command: >
      sh -c "
        until nc -z redis 6379; do sleep 1; done &&
        cd /app/services/api-gateway &&
        /app/node_modules/.bin/ts-node-dev --respawn --transpile-only src/index.ts
      "
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      COLLAB_SERVICE_URL: http://collaboration-service:3002
      DOCUMENT_SERVICE_URL: http://document-service:3003
      PRESENCE_SERVICE_URL: http://presence-service:3004
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey-changeinprod}
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collab-net
    restart: on-failure

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: development
    command: >
      sh -c "
        until nc -z postgres 5432; do sleep 1; done &&
        cd /app/services/auth-service &&
        /app/node_modules/.bin/ts-node-dev --respawn --transpile-only src/index.ts
      "
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://admin:secret@postgres:5432/auth_db
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey-changeinprod}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - collab-net
    restart: on-failure

  collaboration-service:
    build:
      context: .
      dockerfile: services/collaboration-service/Dockerfile
      target: development
    command: >
      sh -c "
        until nc -z redis 6379; do sleep 1; done &&
        until nc -z kafka 9092; do sleep 2; done &&
        cd /app/services/collaboration-service &&
        /app/node_modules/.bin/ts-node-dev --respawn --transpile-only src/index.ts
      "
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey-changeinprod}
      CLIENT_URL: http://localhost:5173
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - collab-net
    restart: on-failure

  document-service:
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
      target: development
    command: >
      sh -c "
        until nc -z postgres 5432; do sleep 1; done &&
        until nc -z kafka 9092; do sleep 2; done &&
        cd /app/services/document-service &&
        /app/node_modules/.bin/ts-node-dev --respawn --transpile-only src/index.ts
      "
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://admin:secret@postgres:5432/document_db
      KAFKA_BROKERS: kafka:9092
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - collab-net
    restart: on-failure

  presence-service:
    build:
      context: .
      dockerfile: services/presence-service/Dockerfile
      target: development
    command: >
      sh -c "
        until nc -z redis 6379; do sleep 1; done &&
        cd /app/services/presence-service &&
        /app/node_modules/.bin/ts-node-dev --respawn --transpile-only src/index.ts
      "
    environment:
      PORT: 3004
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey-changeinprod}
      NODE_ENV: development
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - collab-net
    restart: on-failure

networks:
  collab-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  # zookeeper-data removed — no longer needed